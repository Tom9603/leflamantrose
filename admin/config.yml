backend:
  name: git-gateway
  branch: main

media_folder: images/gallery
public_folder: /images/gallery

locale: fr

collections:
  - name: settings
    label: Paramètres du site
    files:
      - name: categories
        label: "Noms des catégories"
        file: categories.json
        fields:
          - name: anniversaire
            label: "Catégorie 1 (bouton + étiquettes)"
            widget: string
            default: "Anniversaires"
          - name: mariage
            label: "Catégorie 2 (bouton + étiquettes)"
            widget: string
            default: "Mariages"
          - name: biscuit
            label: "Catégorie 3 (bouton + étiquettes)"
            widget: string
            default: "Biscuits"
          - name: brunch
            label: "Catégorie 4 (bouton + étiquettes)"
            widget: string
            default: "Brunchs"

      - name: contact_info
        label: "Informations de contact"
        file: contact.json
        fields:
          - name: address_text
            label: Adresse (affichée)
            widget: string
            default: "9 Route de Brest, 29000 Quimper"
          - name: address_maps
            label: Lien Google Maps
            widget: string
            default: "https://maps.google.com/?q=9+Rte+de+Brest,+29000+Quimper"
          - name: phone_text
            label: Téléphone (affiché)
            widget: string
            default: "06 17 51 38 21"
          - name: phone_tel
            label: Lien téléphone (format tel:+33...)
            widget: string
            default: "tel:+33617513821"
          - name: email
            label: Email
            widget: string
            default: "leflamantrosepatisserie@gmail.com"

      - name: about
        label: "Section L'Atelier"
        file: about.json
        fields:
          - name: photo
            label: Photo de l'atelier
            widget: image
            required: false
            default: ""
            hint: "Photo de Clémentine ou de l'atelier — format portrait recommandé"

  - name: gallery
    label: Galerie
    files:
      - name: gallery_items
        label: Photos de la galerie
        file: gallery.json
        fields:
          - name: items
            label: Photos
            widget: list
            label_singular: Photo
            fields:
              - { name: title,    label: Titre,     widget: string }
              - name: category
                label: Catégorie
                widget: select
                options:
                  - { label: Anniversaire, value: anniversaire }
                  - { label: Mariage,      value: mariage }
                  - { label: Biscuits,     value: biscuit }
                  - { label: Brunch,       value: brunch }
              - name: image
                label: Photo
                widget: image
                required: false
                default: ""
              - name: size
                label: Format
                widget: select
                options:
                  - { label: "Normal",                  value: normal }
                  - { label: "Grand (hauteur ×2)",      value: tall }
                  - { label: "Large (largeur ×2)",      value: wide }
                default: normal
